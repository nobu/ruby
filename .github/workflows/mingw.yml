name: MinGW
on: [push, pull_request]

# Notes:
# Actions console encoding causes issues, see test-all & test-spec steps
#
jobs:
  make:
    runs-on: windows-2019
    env:
      MSYSTEM: MINGW64
      MSYSTEM_PREFIX: /mingw64
      MSYS2_ARCH: x86_64
      CHOST: "x86_64-w64-mingw32"
      CFLAGS:   "-march=x86-64 -mtune=generic -O3 -pipe -fstack-protector-strong"
      CXXFLAGS: "-march=x86-64 -mtune=generic -O3 -pipe"
      CPPFLAGS: "-D_FORTIFY_SOURCE=2 -D__USE_MINGW_ANSI_STDIO=1 -DFD_SETSIZE=2048"
      LDFLAGS:  "-pipe -fstack-protector-strong"
      UPDATE_UNICODE: "UNICODE_FILES=. UNICODE_PROPERTY_FILES=. UNICODE_AUXILIARY_FILES=. UNICODE_EMOJI_FILES=."
      GITPULLOPTIONS: --no-tags origin ${{github.ref}}
    strategy:
      matrix:
        test_task: [ "check" ] # to make job names consistent
      fail-fast: false
    if: "!contains(github.event.head_commit.message, '[ci skip]')"
    steps:
      - run: mkdir build
        working-directory:
      - name: git config
        run: |
          git config --global core.autocrlf false
          git config --global core.eol lf
          git config --global advice.detachedHead 0
      - uses: actions/checkout@v2
        with:
          path: src
      - name: Set up Ruby & MSYS2
        uses: MSP-Greg/setup-ruby-pkgs@v1
        with:
          ruby-version: 2.6
          mingw: _upgrade_ gdbm gmp libffi libyaml openssl ragel readline
          msys2: automake1.16 bison
      - name: Set ENV
        run: |
          echo "BUILD_JOBS=$((2 * NUMBER_OF_PROCESSORS))" >> $GITHUB_ENV
          echo "TEST_JOBS=$((15 * NUMBER_OF_PROCESSORS / 10))" >> $GITHUB_ENV

      - name: where check
        run: |
          # show where
          result=true
          for e in gcc.exe ragel.exe make.exe bison.exe libcrypto-1_1-x64.dll libssl-1_1-x64.dll; do
            echo
            where $e || result=false
          done
          $result

      - run: autoreconf -i
        working-directory: src

      - name: Run configure
        run: |
          config_args="--build=$CHOST --host=$CHOST --target=$CHOST"
          echo $config_args
          ../src/configure --disable-install-doc --prefix=/. $config_args
          # echo "-------------------------------------- config.log"
          # cat ./config.log

      - run: make $JOBS incs
      - run: make $JOBS
        timeout-minutes: 40

      - run: make leaked-globals
      - run: make prepare-gems

      - name: make ${{ matrix.test_task }}
        timeout-minutes: 60
        run: |
          chcp.com 437
          unset BUNDLER_VERSION
          make ${{ matrix.test_task }}
        env:
          RUBY_TESTOPTS: "--retry --job-status=normal --show-skip --timeout-scale=1.5"
          GNUMAKEFLAGS: "-j$TEST_JOBS"

      - uses: k0kubun/action-slack@v2.0.0
        with:
          payload: |
            {
              "ci": "GitHub Actions",
              "env": "${{ github.workflow }} / ${{ matrix.test_task }}",
              "url": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}",
              "commit": "${{ github.sha }}",
              "branch": "${{ github.ref }}".split('/').reverse()[0]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SIMPLER_ALERTS_URL }} # ruby-lang slack: ruby/simpler-alerts-bot
        if: failure() && github.event_name == 'push'

defaults:
  run:
    working-directory: build
    shell: sh
